<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Health Monitoring Dashboards for North Batinah Governorate (NBG) — Women & Child Health Department, Ministry of Health Oman. Data 2023, 2024 & 2025."
    />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light dark" />
    <!-- PWA: installable standalone app. All additive — these tags are inert on
         desktop browsers, so the desktop/PC experience is unchanged. -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="NBG-OM" />
    <!-- Apply the saved/system theme before paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('nbg-theme')
          var dark =
            saved === 'dark' ||
            (saved !== 'light' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          var root = document.documentElement
          root.classList.toggle('dark', dark)
          root.style.colorScheme = dark ? 'dark' : 'light'
        } catch (e) {
          /* localStorage unavailable — default to light */
        }
      })()
    </script>
    <title>NBG Health Dashboards — Women &amp; Child Health (2023–2025)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
